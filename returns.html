<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raise Return Request | Aarunya Jewels Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="page-hero"><div class="container"><div class="breadcrumb">Home / Return Request</div><span class="eyebrow">Returns</span><h1 class="section-title">Raise a demo return request</h1></div></section>
    <section class="section"><div class="container form-card track-card">
      <form data-demo-form>
        <div class="form-grid">
          <input class="form-control" placeholder="Order ID" required>
          <input class="form-control" placeholder="Phone number" required>
          <select class="select-control span-2" required><option value="">Reason</option><option>Received damaged item</option><option>Wrong product</option><option>Size issue</option><option>Other</option></select>
          <textarea class="form-control span-2" placeholder="Describe issue"></textarea>
        </div><br>
        <button class="btn full" type="submit">Submit Demo Request</button>
      </form>
    </div></section>
  </main>
  <div id="site-footer"></div><div id="global-ui"></div>
  <script src="assets/js/data.js"></script><script src="assets/js/app.js"></script>
</body>
</html>
