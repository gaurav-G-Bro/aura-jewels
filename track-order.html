<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | Aarunya Jewels Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="page-hero"><div class="container"><div class="breadcrumb">Home / Track Order</div><span class="eyebrow">Order Status</span><h1 class="section-title">Track your demo order</h1></div></section>
    <section class="section"><div class="container content-card track-card">
      <form data-track-form>
        <label><strong>Order ID</strong></label><br><br>
        <input class="form-control" data-track-input placeholder="Example: AJ-123456" required><br><br>
        <button class="btn full" type="submit">Track Order</button>
      </form>
      <div data-track-status></div>
    </div></section>
  </main>
  <div id="site-footer"></div><div id="global-ui"></div>
  <script src="assets/js/data.js"></script><script src="assets/js/app.js"></script>
